<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jednoduchý dotazník</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
        input, button { padding: 10px; }
    </style>
</head>
<body>
    <form id="dotaznik">
        <label>Jméno a příjmení:</label>
        <input type="text" id="jmeno" required>
        
        <label>Číslo občanského průkazu:</label>
        <input type="text" id="op" required>
        
        <button type="submit">Odeslat data</button>
    </form>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxn5RksG2f-dhj3X9Xef4ITzgvLwazw23pwYgiNWEAEctMnyB4XiPrquyykZdBjU-CC/exec';
        const form = document.getElementById('dotaznik');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const data = {
                jmeno: document.getElementById('jmeno').value,
                op: document.getElementById('op').value
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Důležité pro Apps Script, pokud nechceš řešit CORS složitě
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(() => {
                alert('Data byla odeslána!');
                form.reset();
            })
            .catch(error => console.error('Chyba!', error.message));
        });
    </script>
</body>
</html>
